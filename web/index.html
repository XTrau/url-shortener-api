<!DOCTYPE html>
<html>

<head>
    <title>Сокращатель ссылок - URL shortener</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="block">
        <h1>URL Shortener</h1>
        <div class="controls">
            <input type="text" class="url-input" value="https://yandex.ru">
            <button class="btn">Сократить</button>
        </div>
        <div class="output">
            Результат: <a class="short-url" href="#" target="_blank"></a>
        </div>
    </div>

    <script src="index.js"></script>
</body>

</html>
